{% extends 'manager/base.html' %}
{% block content %}
<div class="card" style="max-width:500px; margin:auto;">
    <h2 style="margin-bottom:20px;">📁 Create New Project</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Project Name</label>
        <input type="text" name="name" placeholder="Enter project name" required>
        <label>Description</label>
        <textarea name="description" placeholder="What is this project about?" style="min-height:100px;"></textarea>
        <button type="submit" class="btn" style="width:100%; padding:12px; font-size:16px;">Create Project 🚀</button>
    </form>
</div>
{% endblock %}
